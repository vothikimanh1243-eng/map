<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bản Đồ Ẩm Thực & Địa Điểm Cao Cấp</title>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #090d16 0%, #111827 100%);
            --glass-bg: rgba(17, 24, 39, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-grad); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Glassmorphism */
        .sidebar {
            width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-icon {
            width: 42px; height: 42px; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 15px var(--accent-glow);
        }
        .brand h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
        .brand p { font-size: 0.75rem; color: var(--text-sub); }

        .search-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0 12px;
            transition: all 0.3s ease;
        }
        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .input-box span { font-size: 1rem; margin-right: 8px; }
        input, select {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }
        select option { background: #111827; color: white; }

        .btn-search {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; padding: 12px; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .btn-search:hover { filter: brightness(1.15); transform: translateY(-1px); }

        /* Danh sách kết quả */
        .results-container {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 4px;
        }
        .results-container::-webkit-scrollbar { width: 5px; }
        .results-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease;
            display: flex; flex-direction: column; gap: 6px;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateX(4px);
        }
        .result-title { font-weight: 600; font-size: 1rem; color: #f1f5f9; }
        .result-address { font-size: 0.85rem; color: var(--text-sub); line-height: 1.4; }
        .result-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
        .rating { font-size: 0.85rem; color: #fbbf24; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .status-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
        .status-open { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .status-close { background: rgba(239, 68, 68, 0.15); color: #f87171; }

        /* Khung bản đồ */
        #map { flex: 1; height: 100%; }

        /* Thông báo trạng thái */
        .empty-state { text-align: center; color: var(--text-sub); margin-top: 40px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon">🗺️</div>
            <div>
                <h1>Smart Map Explorer</h1>
                <p>Khám phá không gian ẩm thực quanh bạn</p>
            </div>
        </div>

        <div class="search-card">
            <div class="input-box">
                <span>🔍</span>
                <input type="text" id="keyword" placeholder="Nhập tên quán, món ăn (VD: Phở, Coffee)...">
            </div>
            <div class="input-box">
                <span>📍</span>
                <select id="radius">
                    <option value="5000">Bán kính: 5 km</option>
                    <option value="10000">Bán kính: 10 km</option>
                    <option value="20000" selected>Bán kính: 20 km (Tối đa)</option>
                </select>
            </div>
            <button class="btn-search" onclick="searchPlaces()">Khám Phá Ngay</button>
        </div>

        <div class="results-container" id="results-list">
            <div class="empty-state">Nhập từ khóa và chọn bán kính để tìm kiếm các địa điểm tuyệt vời xung quanh bạn.</div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Nhớ thay YOUR_GOOGLE_MAP_API_KEY bằng API Key Google Maps thực tế của bạn -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_API_KEY&libraries=places&callback=initMap"></script>

    <script>
        let map, service, infowindow, currentPos;
        let markers = [];

        function initMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    currentPos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    // Style Bản đồ tối đồng bộ giao diện Dark Mode
                    const darkMapStyle = [
                        { elementType: "geometry", stylers: [{ color: "#111827" }] },
                        { elementType: "labels.text.stroke", stylers: [{ color: "#1f2937" }] },
                        { elementType: "labels.text.fill", stylers: [{ color: "#9ca3af" }] },
                        { featureType: "road", elementType: "geometry", stylers: [{ color: "#1f2937" }] },
                        { featureType: "water", elementType: "geometry", stylers: [{ color: "#090d16" }] }
                    ];

                    map = new google.maps.Map(document.getElementById('map'), {
                        center: currentPos,
                        zoom: 14,
                        styles: darkMapStyle,
                        disableDefaultUI: true,
                        zoomControl: true
                    });

                    infowindow = new google.maps.InfoWindow();
                    service = new google.maps.places.PlacesService(map);
                    
                    // Marker vị trí hiện tại
                    new google.maps.Marker({
                        position: currentPos,
                        map: map,
                        title: "Vị trí của bạn",
                        icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
                    });

                }, () => {
                    alert("Vui lòng cấp quyền định vị GPS trên trình duyệt!");
                });
            } else {
                alert("Trình duyệt không hỗ trợ định vị.");
            }
        }

        function searchPlaces() {
            const keyword = document.getElementById('keyword').value.trim();
            const radius = parseInt(document.getElementById('radius').value);

            if (!keyword) {
                alert("Vui lòng nhập tên nhà hàng hoặc món ăn!");
                return;
            }

            const request = {
                location: currentPos,
                radius: radius,
                keyword: [keyword]
            };

            service.nearbySearch(request, (results, status) => {
                const listContainer = document.getElementById('results-list');
                listContainer.innerHTML = '';

                if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                    clearMarkers();

                    results.forEach(place => {
                        createMarker(place);

                        const isOpen = place.opening_hours ? place.opening_hours.isOpen() : null;
                        const statusHtml = isOpen !== null ? 
                            `<span class="status-tag ${isOpen ? 'status-open' : 'status-close'}">${isOpen ? 'Đang mở cửa' : 'Đã đóng cửa'}</span>` : '';

                        const div = document.createElement('div');
                        div.className = 'result-item';
                        div.innerHTML = `
                            <div class="result-title">${place.name}</div>
                            <div class="result-address">${place.vicinity || 'Đang cập nhật địa chỉ'}</div>
                            <div class="result-footer">
                                <div class="rating">⭐ ${place.rating ? place.rating : 'N/A'} <span style="color:#64748b; font-weight:normal">(${place.user_ratings_total || 0})</span></div>
                                ${statusHtml}
                            </div>
                        `;
                        div.onclick = () => {
                            map.setCenter(place.geometry.location);
                            map.setZoom(17);
                        };
                        listContainer.appendChild(div);
                    });
                } else {
                    listContainer.innerHTML = `<div class="empty-state" style="color: #f87171;">Không tìm thấy địa điểm nào phù hợp trong bán kính đã chọn.</div>`;
                }
            });
        }

        function createMarker(place) {
            const marker = new google.maps.Marker({
                map: map,
                position: place.geometry.location
            });

            markers.push(marker);

            google.maps.event.addListener(marker, 'click', () => {
                infowindow.setContent(`<div style="color:#000; padding:4px;"><strong>${place.name}</strong><br>${place.vicinity}<br>⭐ ${place.rating || 'N/A'}</div>`);
                infowindow.open(map, marker);
            });
        }

        function clearMarkers() {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
        }
    </script>
</body>
</html>
