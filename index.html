<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Map Free - Optimized</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #090d16 0%, #111827 100%);
            --glass-bg: rgba(17, 24, 39, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-grad); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon {
            width: 42px; height: 42px; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 15px var(--accent-glow);
        }
        .brand h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
        .brand p { font-size: 0.75rem; color: var(--text-sub); }

        .search-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0 12px;
            transition: all 0.3s ease;
        }
        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .input-box span { font-size: 1rem; margin-right: 8px; }
        input, select {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }
        select option { background: #111827; color: white; }

        .btn-search {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; padding: 12px; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .btn-search:hover { filter: brightness(1.15); transform: translateY(-1px); }

        .results-container {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 4px;
        }
        .results-container::-webkit-scrollbar { width: 5px; }
        .results-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease;
            display: flex; flex-direction: column; gap: 6px;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateX(4px);
        }
        .result-title { font-weight: 600; font-size: 1rem; color: #f1f5f9; }
        .result-address { font-size: 0.85rem; color: var(--text-sub); line-height: 1.4; }
        .result-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
        .rating { font-size: 0.85rem; color: #fbbf24; font-weight: 600; }

        #map { flex: 1; height: 100%; background: #0b0f19; }
        .empty-state { text-align: center; color: var(--text-sub); margin-top: 40px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon">🗺️</div>
            <div>
                <h1>Smart Map Free</h1>
                <p>Khám phá tiện ích & cửa hàng quanh bạn</p>
            </div>
        </div>

        <div class="search-card">
            <div class="input-box">
                <span>🔍</span>
                <input type="text" id="keyword" placeholder="Nhập tên (VD: Bách Hóa Xanh, Phở, Cafe)...">
            </div>
            <div class="input-box">
                <span>📍</span>
                <select id="radius">
                    <option value="5000">Bán kính: 5 km</option>
                    <option value="10000">Bán kính: 10 km</option>
                    <option value="20000" selected>Bán kính: 20 km (Tối đa)</option>
                </select>
            </div>
            <button class="btn-search" onclick="searchPlaces()">Khám Phá Ngay</button>
        </div>

        <div class="results-container" id="results-list">
            <div class="empty-state">Nhập từ khóa và bấm tìm kiếm các địa điểm xung quanh bạn.</div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, currentLat, currentLng;
        let markersLayer = L.layerGroup();

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                currentLat = position.coords.latitude;
                currentLng = position.coords.longitude;

                map = L.map('map').setView([currentLat, currentLng], 14);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19,
                    subdomains: 'abcd'
                }).addTo(map);

                markersLayer.addTo(map);

                L.marker([currentLat, currentLng]).addTo(map)
                    .bindPopup("<b>Vị trí của bạn</b>").openPopup();

            }, () => {
                alert("Vui lòng cho phép trình duyệt truy cập vị trí GPS!");
            });
        } else {
            alert("Trình duyệt không hỗ trợ định vị.");
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c;
        }

        async function searchPlaces() {
            const keyword = document.getElementById('keyword').value.trim();
            const maxRadius = parseInt(document.getElementById('radius').value);

            if (!keyword) {
                alert("Vui lòng nhập từ khóa tìm kiếm!");
                return;
            }

            markersLayer.clearLayers();
            const listContainer = document.getElementById('results-list');
            listContainer.innerHTML = `<div class="empty-state">Đang quét dữ liệu trong bán kính ${maxRadius/1000}km...</div>`;

            // Sử dụng Overpass API (Truy vấn chuyên sâu của OpenStreetMap) để tìm chính xác theo tên và bán kính tọa độ cực nhạy
            const query = `
                [out:json][timeout:25];
                (
                  node["name"~"${keyword}", i](around:${maxRadius},${currentLat},${currentLng});
                  way["name"~"${keyword}", i](around:${maxRadius},${currentLat},${currentLng});
                  relation["name"~"${keyword}", i](around:${maxRadius},${currentLat},${currentLng});
                );
                out center;
            `;

            const url = `https://overpass-api.de/api/interpreter?data=` + encodeURIComponent(query);

            try {
                const response = await fetch(url);
                const data = await response.json();

                listContainer.innerHTML = '';
                let count = 0;

                if (data.elements && data.elements.length > 0) {
                    data.elements.forEach(place => {
                        const lat = place.lat || (place.center && place.center.lat);
                        const lon = place.lon || (place.center && place.center.lon);
                        const name = place.tags && place.tags.name ? place.tags.name : keyword;

                        if (lat && lon) {
                            count++;
                            const distance = getDistance(currentLat, currentLng, lat, lon);

                            const marker = L.marker([lat, lon]).addTo(markersLayer);
                            marker.bindPopup(`<b>${name}</b><br>Cách bạn: ${(distance/1000).toFixed(1)} km`);

                            const div = document.createElement('div');
                            div.className = 'result-item';
                            div.innerHTML = `
                                <div class="result-title">${name}</div>
                                <div class="result-address">Tọa độ: ${lat.toFixed(4)}, ${lon.toFixed(4)}</div>
                                <div class="result-footer">
                                    <div class="rating">📍 Cách bạn ${(distance/1000).toFixed(1)} km</div>
                                </div>
                            `;
                            div.onclick = () => {
                                map.setView([lat, lon], 16);
                                marker.openPopup();
                            };
                            listContainer.appendChild(div);
                        }
                    });
                }

                if (count === 0) {
                    listContainer.innerHTML = `<div class="empty-state" style="color: #f87171;">Không tìm thấy kết quả nào với từ khóa "${keyword}" trong bán kính ${maxRadius/1000}km. Hãy thử từ khóa chung chung hơn (VD: siêu thị, quán ăn, cafe...)!</div>`;
                }
            } catch (error) {
                listContainer.innerHTML = `<div class="empty-state" style="color: #f87171;">Lỗi kết nối máy chủ bản đồ. Vui lòng thử lại sau giây lát.</div>`;
            }
        }
    </script>
</body>
</html>
