<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Map Explorer - Free</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #090d16 0%, #111827 100%);
            --glass-bg: rgba(17, 24, 39, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-grad); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon {
            width: 42px; height: 42px; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 15px var(--accent-glow);
        }
        .brand h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
        .brand p { font-size: 0.75rem; color: var(--text-sub); }

        .search-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0 12px;
            transition: all 0.3s ease;
        }
        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .input-box span { font-size: 1rem; margin-right: 8px; }
        input, select {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }
        select option { background: #111827; color: white; }

        .btn-search {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; padding: 12px; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .btn-search:hover { filter: brightness(1.15); transform: translateY(-1px); }

        .results-container {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 4px;
        }
        .results-container::-webkit-scrollbar { width: 5px; }
        .results-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease;
            display: flex; flex-direction: column; gap: 6px;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateX(4px);
        }
        .result-title { font-weight: 600; font-size: 1rem; color: #f1f5f9; }
        .result-address { font-size: 0.85rem; color: var(--text-sub); line-height: 1.4; }
        .result-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
        .rating { font-size: 0.85rem; color: #fbbf24; font-weight: 600; }

        #map { flex: 1; height: 100%; background: #0b0f19; }
        .empty-state { text-align: center; color: var(--text-sub); margin-top: 40px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon">🗺️</div>
            <div>
                <h1>Smart Map Free</h1>
                <p>Khám phá ẩm thực hoàn toàn miễn phí</p>
            </div>
        </div>

        <div class="search-card">
            <div class="input-box">
                <span>🔍</span>
                <input type="text" id="keyword" placeholder="Nhập tên quán, món ăn (VD: Phở, Coffee)...">
            </div>
            <div class="input-box">
                <span>📍</span>
                <select id="radius">
                    <option value="5000">Bán kính: 5 km</option>
                    <option value="10000">Bán kính: 10 km</option>
                    <option value="20000" selected>Bán kính: 20 km (Tối đa)</option>
                </select>
            </div>
            <button class="btn-search" onclick="searchPlaces()">Khám Phá Ngay</button>
        </div>

        <div class="results-container" id="results-list">
            <div class="empty-state">Nhập từ khóa và bấm tìm kiếm các địa điểm xung quanh bạn.</div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, currentLat, currentLng;
        let markersLayer = L.layerGroup();

        // Khởi tạo bản đồ OpenStreetMap
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                currentLat = position.coords.latitude;
                currentLng = position.coords.longitude;

                map = L.map('map').setView([currentLat, currentLng], 14);

                // Dùng nền bản đồ tối CartoDB Dark Matter cực đẹp
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19,
                    subdomains: 'abcd'
                }).addTo(map);

                markersLayer.addTo(map);

                // Đánh dấu vị trí của bạn
                L.marker([currentLat, currentLng]).addTo(map)
                    .bindPopup("<b>Vị trí của bạn</b>").openPopup();

            }, () => {
                alert("Vui lòng cho phép trình duyệt truy cập vị trí GPS!");
            });
        } else {
            alert("Trình duyệt không hỗ trợ định vị.");
        }

        async function searchPlaces() {
            const keyword = document.getElementById('keyword').value.trim();
            const radiusMeters = parseInt(document.getElementById('radius').value);

            if (!keyword) {
                alert("Vui lòng nhập từ khóa tìm kiếm!");
                return;
            }

            markersLayer.clearLayers();
            const listContainer = document.getElementById('results-list');
            listContainer.innerHTML = `<div class="empty-state">Đang tìm kiếm...</div>`;

            // Sử dụng Nominatim API của OpenStreetMap để tìm kiếm địa điểm dựa theo từ khóa và tọa độ
            // Chuyển bán kính mét sang độ (tạm tính: 1 độ ~ 111km)
            const degRadius = radiusMeters / 111000;
            const viewbox = `${currentLng - degRadius},${currentLat + degRadius},${currentLng + degRadius},${currentLat - degRadius}`;
            
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(keyword)}&bounded=1&viewbox=${viewbox}&limit=20`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                listContainer.innerHTML = '';

                if (data.length > 0) {
                    data.forEach(place => {
                        const lat = parseFloat(place.lat);
                        const lon = parseFloat(place.lon);

                        // Tạo marker trên bản đồ
                        const marker = L.marker([lat, lon]).addTo(markersLayer);
                        marker.bindPopup(`<b>${place.display_name}</b>`);

                        // Thêm vào danh sách sidebar
                        const div = document.createElement('div');
                        div.className = 'result-item';
                        div.innerHTML = `
                            <div class="result-title">${place.display_name.split(',')[0]}</div>
                            <div class="result-address">${place.display_name}</div>
                            <div class="result-footer">
                                <div class="rating">⭐ 4.5 (Miễn phí từ OSM)</div>
                            </div>
                        `;
                        div.onclick = () => {
                            map.setView([lat, lon], 16);
                            marker.openPopup();
                        };
                        listContainer.appendChild(div);
                    });
                } else {
                    listContainer.innerHTML = `<div class="empty-state" style="color: #f87171;">Không tìm thấy địa điểm nào trong bán kính này.</div>`;
                }
            } catch (error) {
                listContainer.innerHTML = `<div class="empty-state" style="color: #f87171;">Lỗi kết nối dữ liệu bản đồ.</div>`;
            }
        }
    </script>
</body>
</html>
