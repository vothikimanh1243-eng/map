<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mini Map Siêu Đẹp</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #090d16; color: #f8fafc; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* Khung chứa Mini Map bọc kính mờ */
        .mini-map-card {
            width: 480px;
            height: 620px;
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header Mini */
        .mini-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            z-index: 5;
        }
        .mini-title h2 { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .mini-title p { font-size: 0.75rem; color: #94a3b8; }
        
        .live-dot {
            width: 10px; height: 10px; background: #34d399; border-radius: 50%;
            box-shadow: 0 0 10px #34d399; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* Khung hiển thị bản đồ */
        #map {
            flex: 1;
            width: 100%;
            background: #0b0f19;
        }

        /* Thanh công cụ mini nổi trên bản đồ */
        .mini-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .coord-text { font-size: 0.8rem; color: #cbd5e1; }
        
        .btn-locate {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; padding: 8px 14px; border-radius: 10px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .btn-locate:hover { filter: brightness(1.15); transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="mini-map-card">
        <div class="mini-header">
            <div class="mini-title">
                <h2>Mini Live Map</h2>
                <p>Định vị GPS thời gian thực</p>
            </div>
            <div class="live-dot" title="Đang hoạt động"></div>
        </div>

        <div id="map"></div>

        <div class="mini-controls">
            <div class="coord-text" id="coord-info">Đang xác định tọa độ...</div>
            <button class="btn-locate" onclick="resetCenter()">Về vị trí</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, userMarker, currentPos;

        function initMiniMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    currentPos = [position.coords.latitude, position.coords.longitude];

                    // Khởi tạo bản đồ giao diện tối CartoDB Dark Matter
                    map = L.map('map', {
                        zoomControl: false,
                        attributionControl: false
                    }).setView(currentPos, 15);

                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        maxZoom: 19,
                        subdomains: 'abcd'
                    }).addTo(map);

                    // Thêm Marker vị trí
                    userMarker = L.marker(currentPos).addTo(map)
                        .bindPopup("<b>Bạn đang ở đây!</b>").openPopup();

                    // Cập nhật text tọa độ lên giao diện
                    document.getElementById('coord-info').innerText = `Lat: ${currentPos[0].toFixed(3)}, Lng: ${currentPos[1].toFixed(3)}`;

                }, () => {
                    document.getElementById('coord-info').innerText = "Không thể lấy vị trí GPS.";
                });
            } else {
                document.getElementById('coord-info').innerText = "Trình duyệt không hỗ trợ GPS.";
            }
        }

        function resetCenter() {
            if (currentPos && map) {
                map.setView(currentPos, 16);
                userMarker.openPopup();
            }
        }

        // Chạy khởi tạo bản đồ khi tải trang
        initMiniMap();
    </script>
</body>
</html>
