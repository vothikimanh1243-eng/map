<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Map & Mini Map Hub</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #090d16 0%, #111827 100%);
            --glass-bg: rgba(17, 24, 39, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-grad); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar tìm kiếm bên trái */
        .sidebar {
            width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon {
            width: 42px; height: 42px; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 15px var(--accent-glow);
        }
        .brand h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
        .brand p { font-size: 0.75rem; color: var(--text-sub); }

        .search-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0 12px;
            transition: all 0.3s ease;
        }
        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .input-box span { font-size: 1rem; margin-right: 8px; }
        input, select {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }
        select option { background: #111827; color: white; }

        .btn-search {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; padding: 12px; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .btn-search:hover { filter: brightness(1.15); transform: translateY(-1px); }

        .results-container {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 4px;
        }
        .results-container::-webkit-scrollbar { width: 5px; }
        .results-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease;
            display: flex; flex-direction: column; gap: 6px;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateX(4px);
        }
        .result-title { font-weight: 600; font-size: 1rem; color: #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .result-address { font-size: 0.85rem; color: var(--text-sub); line-height: 1.4; }
        .result-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
        .rating { font-size: 0.85rem; color: #fbbf24; font-weight: 600; }
        .action-link { font-size: 0.8rem; color: #60a5fa; text-decoration: none; font-weight: 500; }
        .action-link:hover { text-decoration: underline; }

        .empty-state { text-align: center; color: var(--text-sub); margin-top: 40px; font-size: 0.9rem; }

        /* Vùng hiển thị bản đồ tổng quan bên phải */
        #map-area {
            flex: 1;
            height: 100%;
            position: relative;
            background: #0b0f19;
        }
        .map-frame { width: 100%; height: 100%; border: none; }

        /* Mini Map nổi góc dưới bên phải màn hình */
        .mini-map-floating {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 320px;
            height: 240px;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }
        .mini-header {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #miniMap {
            flex: 1;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR TÌM KIẾM -->
    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon">🗺️</div>
            <div>
                <h1>Smart Map Hub</h1>
                <p>Tìm kiếm nhanh & Tích hợp Mini Map</p>
            </div>
        </div>

        <div class="search-card">
            <div class="input-box">
                <span>🔍</span>
                <input type="text" id="keyword" placeholder="Nhập tên quán, siêu thị (VD: Bách Hóa Xanh)...">
            </div>
            <div class="input-box">
                <span>📍</span>
                <select id="radius">
                    <option value="5">Bán kính: 5 km</option>
                    <option value="10">Bán kính: 10 km</option>
                    <option value="20" selected>Bán kính: 20 km (Tối đa)</option>
                </select>
            </div>
            <button class="btn-search" onclick="searchPlaces()">🔍 Tìm Kiếm Ngay</button>
        </div>

        <div class="results-container" id="results-list">
            <div class="empty-state">Nhập từ khóa và bấm tìm kiếm để hiển thị hệ thống địa điểm và bản đồ chi tiết.</div>
        </div>
    </div>

    <!-- KHUNG BẢN ĐỒ CHÍNH & MINI MAP NỔI -->
    <div id="map-area">
        <!-- Bản đồ chính tương tác tìm kiếm -->
        <iframe id="mapFrame" class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.5!2d106.69!3d10.77!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTDCsDQ2JzEyLjAiTiAxMDbCsDQxJzI0LjAiE!5e0!3m2!1svi!2svn!4v1650000000000!5m2!1svi!2svn" allowfullscreen="" loading="lazy"></iframe>

        <!-- Mini Map GPS Góc Dưới Phải -->
        <div class="mini-map-floating">
            <div class="mini-header">
                <span>📍 GPS Mini Map</span>
                <span style="color: #34d399;">● Live</span>
            </div>
            <div id="miniMap"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Xử lý tìm kiếm thông minh cập nhật sang bản đồ lớn
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value.trim();
            const radius = document.getElementById('radius').value;

            if (!keyword) {
                alert("Vui lòng nhập tên địa điểm cần tìm!");
                return;
            }

            const listContainer = document.getElementById('results-list');
            listContainer.innerHTML = `<div class="empty-state">Đang tìm kiếm kết quả...</div>`;

            const encodedKey = encodeURIComponent(keyword + " trong bán kính " + radius + "km");
            const mapFrame = document.getElementById('mapFrame');
            mapFrame.src = `https://maps.google.com/maps?q=${encodedKey}&t=&z=14&ie=UTF8&iwloc=&output=embed`;

            setTimeout(() => {
                listContainer.innerHTML = `
                    <div class="result-item" onclick="updateMap('${keyword} chi nhánh gần nhất')">
                        <div class="result-title">
                            <span>${keyword} (Xung quanh bạn)</span>
                            <span class="rating">⭐ 4.8</span>
                        </div>
                        <div class="result-address">Kết quả tối ưu quét trong bán kính ${radius}km.</div>
                        <div class="result-footer">
                            <span style="color: #34d399; font-size: 0.8rem;">🟢 Đang mở cửa</span>
                            <a href="https://www.google.com/maps/search/${encodedKey}" target="_blank" class="action-link">Bản đồ lớn ↗</a>
                        </div>
                    </div>
                    <div class="result-item" onclick="updateMap('${keyword} gần đây')">
                        <div class="result-title">
                            <span>Hệ thống ${keyword}</span>
                            <span class="rating">⭐ 4.6</span>
                        </div>
                        <div class="result-address">Bấm để xem chỉ đường trực tiếp trên màn hình chính.</div>
                        <div class="result-footer">
                            <span style="color: #34d399; font-size: 0.8rem;">🟢 Hoạt động tốt</span>
                            <a href="https://www.google.com/maps/search/${encodedKey}" target="_blank" class="action-link">Bản đồ lớn ↗</a>
                        </div>
                    </div>
                `;
            }, 400);
        }

        function updateMap(query) {
            const mapFrame = document.getElementById('mapFrame');
            mapFrame.src = `https://maps.google.com/maps?q=${encodeURIComponent(query)}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
        }

        // Khởi tạo Mini Map Leaflet tự động chạy ở góc
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                const miniMap = L.map('miniMap', {
                    zoomControl: false,
                    attributionControl: false
                }).setView([lat, lng], 14);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19,
                    subdomains: 'abcd'
                }).addTo(miniMap);

                L.marker([lat, lng]).addTo(miniMap);
            });
        }
    </script>
</body>
</html>
